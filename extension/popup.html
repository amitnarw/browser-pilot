<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      padding: 16px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #171615;
      color: #d6d5d4;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(78,153,163,0.1);
    }
    .header .icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #4e99a3, #64a6af);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }
    .header .title {
      font-size: 14px;
      font-weight: 600;
    }
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .status-row .label { color: #d6d5d480; }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .status-dot.connected { background: #539e55; }
    .status-dot.disconnected { background: #dc6973; }
    .task-name {
      font-size: 12px;
      color: #4e99a3;
      background: #1e1d1c;
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 12px;
      word-break: break-word;
      border: 1px solid rgba(78,153,163,0.08);
    }
    .task-name.no-task { color: #d6d5d433; font-style: italic; }
    .btn {
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(78,153,163,0.15);
      border-radius: 8px;
      background: #1e1d1c;
      color: #d6d5d4;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: rgba(78,153,163,0.08); }
    .btn:active { background: rgba(78,153,163,0.12); }
    .btn.primary {
      background: linear-gradient(135deg, #4e99a3, #64a6af);
      border-color: #4e99a3;
    }
    .btn.primary:hover { background: linear-gradient(135deg, #5aa8b2, #6eb0b9); }
    .version {
      text-align: center;
      font-size: 11px;
      color: #d6d5d433;
      margin-top: 12px;
    }
    .debug-toggle {
      text-align: center;
      font-size: 11px;
      color: #64a6af;
      cursor: pointer;
      margin-top: 8px;
      text-decoration: underline;
    }
    .debug-toggle:hover { color: #7ab3bc; }
    .debug-panel {
      display: none;
      margin-top: 12px;
      max-height: 200px;
      overflow-y: auto;
      background: #171615;
      border: 1px solid rgba(78,153,163,0.08);
      border-radius: 6px;
      padding: 8px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 10px;
      line-height: 1.5;
      color: #d6d5d480;
    }
    .debug-panel.visible { display: block; }
    .log-entry { margin-bottom: 2px; }
    .log-time { color: #d6d5d433; }
    .log-msg { color: #d6d5d4a6; }
  </style>
</head>
<body>
    <div class="header">
      <div class="icon">BP</div>
      <div class="title">BrowserPilot</div>
    </div>

  <div class="status-row">
    <span class="label">Server</span>
    <span id="connection-status">
      <span class="status-dot disconnected" id="status-dot"></span>
      <span id="status-text">Checking...</span>
    </span>
  </div>

  <div class="status-row">
    <span class="label">Task</span>
  </div>
  <div class="task-name no-task" id="task-display">No active task</div>

  <button class="btn primary" id="open-sidebar">Open Activity Sidebar</button>
  <button class="btn" id="take-control" style="margin-top:8px;">Take Control</button>

  <div class="debug-toggle" id="debug-toggle">Show Debug Logs</div>
  <div class="debug-panel" id="debug-panel"></div>

  <div class="version" id="version-display">v1.0.0</div>

  <script src="popup.js"></script>
</body>
</html>
