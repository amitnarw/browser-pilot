<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BrowserPilot</title>
<link href="fonts/inter.css" rel="stylesheet" />
<link href="fonts/geist.css" rel="stylesheet" />
<link href="fonts/outlined.css" rel="stylesheet" />
<link href="tailwind.css" rel="stylesheet" />
</head>
<body class="mesh-bg text-on-surface h-screen overflow-hidden flex flex-col font-body-lg">
  <header class="flex justify-between items-center px-inner-padding h-16 w-full sticky top-0 z-50 bg-surface/60 dark:bg-surface/60 backdrop-blur-[32px] border-b border-white/10 shadow-none transition-colors shrink-0">
    <button class="text-on-surface-variant dark:text-on-surface-variant hover:bg-white/5 transition-colors p-2 rounded-full flex items-center justify-center">
      <div id="spinner" class="hidden w-8 h-8 rounded-full bg-surface-container flex items-center justify-center ai-core relative shadow-[0_0_15px_rgba(125,1,177,0.4)]">
        <span class="material-symbols-outlined text-primary text-[20px]" data-icon="smart_toy" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
      </div>
    </button>
    <div class="font-headline-md text-headline-md font-bold tracking-tight text-primary dark:text-primary">BrowserPilot</div>
    <button class="text-on-surface-variant dark:text-on-surface-variant hover:bg-white/5 transition-colors p-2 rounded-full flex items-center justify-center">
      <span class="material-symbols-outlined text-[24px]" data-icon="sensors">sensors</span>
    </button>
  </header>

  <main class="flex-1 overflow-y-auto custom-scrollbar pb-24 p-container-padding flex flex-col gap-section-gap">
    
    <!-- Active State -->
    <div id="active-state" class="hidden flex-col gap-section-gap flex-1">
      <section class="flex flex-col gap-stack-gap mt-4">
        <h2 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Active Goal</h2>
        <div class="active-neon-card rounded-xl p-4 flex flex-col gap-4 relative overflow-hidden">
          <div class="absolute -top-10 -right-10 w-24 h-24 bg-primary-container rounded-full blur-[40px] opacity-30"></div>
          
          <div id="lock-banner" class="hidden items-center gap-2 bg-error-container/20 border border-error/30 rounded-lg p-2 z-10">
            <span class="material-symbols-outlined text-error text-[16px]" data-icon="lock">lock</span>
            <span class="font-label-md text-[11px] text-error uppercase">AI is controlling the browser</span>
          </div>

          <div class="flex items-start gap-3 z-10">
            <span class="material-symbols-outlined text-primary mt-0.5 text-[24px]" data-icon="target">target</span>
            <p id="task-name" class="font-body-sm text-body-sm text-on-surface">Task description...</p>
          </div>
          
          <div class="flex flex-col gap-1 z-10">
            <div class="flex justify-between items-center">
              <span class="font-mono-code text-mono-code text-primary">33%</span>
              <span class="font-label-md text-label-md text-on-surface-variant">Running</span>
            </div>
            <div class="h-1.5 w-full bg-surface-container-high rounded-full overflow-hidden">
              <div class="h-full bg-gradient-to-r from-[#005bc1] to-[#007aff] w-1/3 rounded-full relative">
                <div class="absolute top-0 right-0 bottom-0 w-4 bg-white/40 blur-[2px]"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
      
      <section class="flex flex-col gap-stack-gap flex-1">
        <div class="flex items-center justify-between">
          <h2 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Action Log</h2>
          <button class="text-primary hover:text-secondary transition-colors font-label-md text-label-md flex items-center gap-1">
            <span class="material-symbols-outlined text-[16px]" data-icon="pause">pause</span> Halt
          </button>
        </div>
        <div id="actions" class="flex flex-col relative before:absolute before:inset-y-2 before:left-[11.5px] before:w-px before:bg-white/10 ml-1">
        </div>
      </section>
    </div>

    <!-- Idle State -->
    <div id="idle-state" class="flex flex-col items-center justify-center h-full text-center flex-1 py-10">
      <div class="w-16 h-16 rounded-full bg-surface-container-highest border border-outline/30 flex items-center justify-center mb-4">
        <span class="material-symbols-outlined text-outline text-3xl" data-icon="hourglass_empty">hourglass_empty</span>
      </div>
      <h2 class="font-headline-md text-headline-md text-on-surface mb-2">Ready & Waiting</h2>
      <p class="font-body-sm text-body-sm text-on-surface-variant max-w-[240px]">Real-time activity will appear here.</p>
    </div>

    <!-- Debug Section -->
    <div class="mt-auto pt-6 border-t border-white/5 flex flex-col gap-4">
      <div id="debug-toggle" class="text-center font-label-md text-[11px] text-primary cursor-pointer hover:text-primary-container uppercase tracking-wider">Show Debug Logs</div>
      <div id="debug-section" class="hidden flex-col gap-2">
        <div class="flex justify-between items-center">
          <span class="font-label-md text-[11px] text-on-surface-variant uppercase">Debug Logs</span>
          <span id="debug-clear" class="font-label-md text-[11px] text-primary cursor-pointer hover:text-primary-container">Clear</span>
        </div>
        <div id="debug-logs" class="max-h-[200px] overflow-y-auto custom-scrollbar font-mono-code text-[11px] leading-relaxed text-on-surface-variant bg-surface-container-lowest p-3 rounded-lg border border-white/5"></div>
      </div>
    </div>
  </main>



  <script src="sidepanel.js"></script>
</body>
</html>
