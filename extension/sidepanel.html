<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrowserPilot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #171615;
      color: #d6d5d4;
      min-height: 100vh;
      overflow-y: auto;
    }
    .header {
      padding: 20px;
      border-bottom: 1px solid rgba(78,153,163,0.1);
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      background: rgba(23,22,21,0.95);
      backdrop-filter: blur(16px);
      z-index: 10;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #4e99a3, #64a6af);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: white;
      box-shadow: 0 2px 8px rgba(78,153,163,0.3);
    }
    .header-text { flex: 1; }
    .title {
      font-size: 14px;
      font-weight: 600;
      color: #d6d5d4;
      letter-spacing: -0.01em;
    }
    .subtitle {
      font-size: 11px;
      color: #d6d5d480;
      margin-top: 2px;
    }
    .spinner-wrap {
      position: relative;
      width: 20px;
      height: 20px;
    }
    @keyframes spinOuter { to { transform: rotate(360deg); } }
    @keyframes spinInner { to { transform: rotate(-360deg); } }
    .spinner-outer {
      position: absolute;
      top: 0; left: 0;
      width: 20px; height: 20px;
      border: 1.5px solid rgba(78,153,163,0.1);
      border-top-color: #4e99a3;
      border-radius: 50%;
      animation: spinOuter 1.4s linear infinite;
    }
    .spinner-inner {
      position: absolute;
      top: 4px; left: 4px;
      width: 12px; height: 12px;
      border: 1.5px solid rgba(78,153,163,0.1);
      border-bottom-color: #64a6af;
      border-radius: 50%;
      animation: spinInner 1s linear infinite;
    }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: rgba(78,153,163,0.06);
      border: 1px solid rgba(78,153,163,0.12);
      border-radius: 8px;
      margin: 16px 20px;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-dot {
      width: 6px;
      height: 6px;
      background: #4e99a3;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
      box-shadow: 0 0 6px rgba(78,153,163,0.4);
    }
    .status-text {
      font-size: 11px;
      font-weight: 500;
      color: #4e99a3;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .lock-banner {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(220,105,115,0.08);
      border: 1px solid rgba(220,105,115,0.2);
      border-radius: 8px;
      margin: 0 20px 12px;
    }
    .lock-banner.visible { display: flex; }
    .lock-icon { font-size: 14px; }
    .lock-text {
      font-size: 11px;
      font-weight: 500;
      color: #e7848a;
      letter-spacing: 0.02em;
    }
    .task {
      padding: 0 20px 16px;
      font-size: 13px;
      color: #d6d5d4a6;
      line-height: 1.5;
    }
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(78,153,163,0.1), transparent);
      margin: 0 20px 16px;
    }
    .actions-label {
      padding: 0 20px 12px;
      font-size: 11px;
      font-weight: 600;
      color: #d6d5d480;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .actions {
      padding: 0 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    @keyframes actionIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .action {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(30,29,28,0.5);
      border: 1px solid rgba(78,153,163,0.08);
      border-radius: 10px;
      animation: actionIn 0.3s ease-out;
    }
    .action-icon {
      width: 20px;
      height: 20px;
      background: rgba(78,153,163,0.1);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .action-icon svg { width: 12px; height: 12px; }
    .action-content { flex: 1; }
    .action-text {
      font-size: 12px;
      color: #d6d5d4;
      line-height: 1.4;
    }
    .action-time {
      font-size: 10px;
      color: #d6d5d450;
      margin-top: 2px;
    }
    .idle-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      text-align: center;
    }
    .idle-icon {
      width: 48px;
      height: 48px;
      background: rgba(78,153,163,0.08);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .idle-icon svg { width: 24px; height: 24px; }
    .idle-title {
      font-size: 14px;
      font-weight: 600;
      color: #d6d5d4a6;
      margin-bottom: 8px;
    }
    .idle-text {
      font-size: 12px;
      color: #d6d5d480;
      line-height: 1.5;
      max-width: 260px;
    }
    .footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(78,153,163,0.1);
      display: flex;
      align-items: center;
      gap: 8px;
      position: sticky;
      bottom: 0;
      background: rgba(30,29,28,0.95);
      backdrop-filter: blur(16px);
    }
    @keyframes dotWave { 0%,80%,100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }
    .footer-dots { display: flex; gap: 3px; }
    .footer-dot {
      width: 4px;
      height: 4px;
      background: #4e99a3;
      border-radius: 50%;
      animation: dotWave 1.4s ease-in-out infinite;
    }
    .footer-dot:nth-child(2) { animation-delay: 0.16s; }
    .footer-dot:nth-child(3) { animation-delay: 0.32s; }
    .footer-text {
      font-size: 10px;
      color: #d6d5d450;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">BP</div>
    <div class="header-text">
      <div class="title">BrowserPilot</div>
      <div class="subtitle">AI agent active</div>
    </div>
    <div class="spinner-wrap" id="spinner" style="display:none">
      <div class="spinner-outer"></div>
      <div class="spinner-inner"></div>
    </div>
  </div>

  <div id="active-state" style="display:none">
    <div class="status-bar">
      <span class="status-dot"></span>
      <span class="status-text">Live</span>
    </div>
    <div class="lock-banner" id="lock-banner">
      <span class="lock-icon">🔒</span>
      <span class="lock-text">AI is controlling the browser</span>
    </div>
    <div class="task" id="task-name"></div>
    <div class="divider"></div>
    <div class="actions-label">Activity</div>
    <div class="actions" id="actions"></div>
  </div>

  <div id="idle-state" class="idle-state">
    <div class="idle-icon">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#4e99a3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="idle-title">Waiting for AI</div>
    <div class="idle-text">The sidebar will show real-time activity when the AI starts controlling the browser.</div>
  </div>

  <div class="footer" id="footer" style="display:none">
    <div class="footer-dots">
      <span class="footer-dot"></span>
      <span class="footer-dot"></span>
      <span class="footer-dot"></span>
    </div>
    <span class="footer-text">Monitoring...</span>
  </div>

  <div id="debug-section" style="display:none; padding: 12px 20px; border-top: 1px solid rgba(78,153,163,0.1);">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
      <span style="font-size:11px; font-weight:600; color:#d6d5d480; text-transform:uppercase; letter-spacing:0.06em;">Debug Logs</span>
      <span id="debug-clear" style="font-size:10px; color:#64a6af; cursor:pointer;">Clear</span>
    </div>
    <div id="debug-logs" style="max-height:300px; overflow-y:auto; font-family:'Cascadia Code','Fira Code',monospace; font-size:10px; line-height:1.5; color:#d6d5d480;"></div>
  </div>

  <div style="padding:8px 20px; border-top: 1px solid rgba(78,153,163,0.1);">
    <div id="debug-toggle" style="text-align:center; font-size:11px; color:#64a6af; cursor:pointer; text-decoration:underline;">Show Debug Logs</div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
