<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BrowserPilot - Pro AI Sidebar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Geist:wght@400;500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&amp;family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }

        /* Ventura Glass 2.0 Aesthetics */
        .glass-panel {
            background: rgba(28, 28, 30, 0.6);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .glass-card {
            background: rgba(44, 44, 46, 0.4);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
        }
        
        .glass-card:hover {
             background: rgba(44, 44, 46, 0.6);
             border-color: rgba(255, 255, 255, 0.2);
        }

        .active-neon-card {
            background: rgba(44, 44, 46, 0.8);
            border: 1px solid #005bc1; /* primary-container approx */
            box-shadow: 0 0 20px rgba(75, 142, 255, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        /* Neon Pulse Animation for AI Core */
        @keyframes neon-pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px rgba(173, 198, 255, 0.5); }
            50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(173, 198, 255, 0.8), 0 0 40px rgba(173, 198, 255, 0.4); }
            100% { transform: scale(1); box-shadow: 0 0 10px rgba(173, 198, 255, 0.5); }
        }
        .ai-core {
            animation: neon-pulse 2s infinite ease-in-out;
        }

        /* Mesh Gradient Background */
        .mesh-bg {
            background-color: #131315; /* background */
            background-image: 
                radial-gradient(at 0% 0%, rgba(75, 142, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(75, 142, 255, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }
        
        /* High-tech loading ring */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-ring {
            border: 2px solid rgba(173, 198, 255, 0.2);
            border-top-color: #adc6ff; /* primary */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Action Log Animation */
        @keyframes slide-fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .action-item {
            animation: slide-fade-in 0.4s ease-out forwards;
        }

        /* Custom Scrollbar for action log */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
                "surface-container-highest": "#353437",
                "surface-container": "#1f1f21",
                "on-primary": "#002e69",
                "on-primary-fixed": "#001a41",
                "inverse-on-surface": "#303032",
                "on-background": "#e4e2e4",
                "primary-fixed-dim": "#adc6ff",
                "primary-container": "#4b8eff",
                "outline": "#8b90a0",
                "on-tertiary-container": "#002957",
                "surface-container-lowest": "#0e0e10",
                "on-secondary-fixed": "#310048",
                "surface-container-high": "#2a2a2c",
                "error-container": "#93000a",
                "inverse-primary": "#005bc1",
                "error": "#ffb4ab",
                "primary-fixed": "#d8e2ff",
                "outline-variant": "#414755",
                "on-secondary": "#510074",
                "on-primary-fixed-variant": "#004493",
                "secondary": "#e9b3ff",
                "on-error-container": "#ffdad6",
                "tertiary": "#aac7ff",
                "secondary-fixed-dim": "#e9b3ff",
                "surface-tint": "#adc6ff",
                "surface": "#131315",
                "surface-bright": "#39393b",
                "on-tertiary-fixed": "#001b3e",
                "secondary-container": "#7d01b1",
                "primary": "#adc6ff",
                "on-surface": "#e4e2e4",
                "tertiary-fixed": "#d6e3ff",
                "on-secondary-container": "#e5a9ff",
                "on-secondary-fixed-variant": "#7200a3",
                "surface-variant": "#353437",
                "tertiary-container": "#3e90ff",
                "on-surface-variant": "#c1c6d7",
                "surface-container-low": "#1b1b1d",
                "inverse-surface": "#e4e2e4",
                "secondary-fixed": "#f6d9ff",
                "on-tertiary-fixed-variant": "#00468d",
                "background": "#131315",
                "tertiary-fixed-dim": "#aac7ff",
                "on-tertiary": "#003064",
                "on-error": "#690005",
                "surface-dim": "#131315",
                "on-primary-container": "#00285c"
        },
        "borderRadius": {
                "DEFAULT": "0.125rem",
                "lg": "0.25rem",
                "xl": "0.5rem",
                "full": "0.75rem"
        },
        "spacing": {
                "container-padding": "1.25rem",
                "sidebar-width": "320px",
                "stack-gap": "0.75rem",
                "section-gap": "1.5rem",
                "inner-padding": "1rem"
        },
        "fontFamily": {
                "label-md": [
                        "Geist"
                ],
                "display-sm": [
                        "Inter"
                ],
                "body-sm": [
                        "Inter"
                ],
                "body-lg": [
                        "Inter"
                ],
                "mono-code": [
                        "Geist"
                ],
                "headline-md": [
                        "Inter"
                ]
        },
        "fontSize": {
                "label-md": [
                        "12px",
                        {
                                "lineHeight": "16px",
                                "letterSpacing": "0.05em",
                                "fontWeight": "500"
                        }
                ],
                "display-sm": [
                        "30px",
                        {
                                "lineHeight": "38px",
                                "letterSpacing": "-0.02em",
                                "fontWeight": "700"
                        }
                ],
                "body-sm": [
                        "14px",
                        {
                                "lineHeight": "20px",
                                "fontWeight": "400"
                        }
                ],
                "body-lg": [
                        "16px",
                        {
                                "lineHeight": "24px",
                                "fontWeight": "400"
                        }
                ],
                "mono-code": [
                        "13px",
                        {
                                "lineHeight": "20px",
                                "fontWeight": "400"
                        }
                ],
                "headline-md": [
                        "20px",
                        {
                                "lineHeight": "28px",
                                "letterSpacing": "-0.01em",
                                "fontWeight": "600"
                        }
                ]
        }
},
    },
  }
</script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="mesh-bg text-on-surface h-screen overflow-hidden flex flex-col font-body-lg">
<!-- Mobile Top App Bar -->
<header class="flex justify-between items-center px-inner-padding h-16 w-full sticky top-0 z-50 bg-surface/60 dark:bg-surface/60 backdrop-blur-[32px] border-b border-white/10 shadow-none transition-colors shrink-0">
<button class="text-on-surface-variant dark:text-on-surface-variant hover:bg-white/5 transition-colors p-2 rounded-full flex items-center justify-center">
<div class="w-8 h-8 rounded-full bg-gradient-to-tr from-primary-container to-secondary-container flex items-center justify-center ai-core relative">
<span class="material-symbols-outlined text-on-primary-container text-lg" data-icon="smart_toy" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
<div class="absolute inset-1 bg-white/30 rounded-full blur-[2px]"></div>
</div>
</button>
<div class="font-headline-md text-headline-md font-bold tracking-tight text-primary dark:text-primary">BrowserPilot</div>
<button class="text-on-surface-variant dark:text-on-surface-variant hover:bg-white/5 transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="sensors">sensors</span>
</button>
</header>
<!-- Mobile Main Content -->
<main class="flex-1 overflow-y-auto custom-scrollbar pb-24 p-container-padding flex flex-col gap-section-gap">
<!-- Current Task Goal -->
<section class="flex flex-col gap-stack-gap mt-4">
<h2 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Active Goal</h2>
<div class="active-neon-card rounded-xl p-4 flex flex-col gap-4 relative overflow-hidden">
<div class="absolute -top-10 -right-10 w-24 h-24 bg-primary-container rounded-full blur-[40px] opacity-30"></div>
<div class="flex items-start gap-3 z-10">
<span class="material-symbols-outlined text-primary mt-0.5" data-icon="target">target</span>
<p class="font-body-sm text-body-sm text-on-surface">Search for the best hiking boots and add to cart</p>
</div>
<div class="flex flex-col gap-1 z-10">
<div class="flex justify-between items-center">
<span class="font-mono-code text-mono-code text-primary">33%</span>
<span class="font-label-md text-label-md text-on-surface-variant">Running</span>
</div>
<div class="h-1.5 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-[#005bc1] to-[#007aff] w-1/3 rounded-full relative">
<div class="absolute top-0 right-0 bottom-0 w-4 bg-white/40 blur-[2px]"></div>
</div>
</div>
</div>
</div>
</section>
<!-- Action Log -->
<section class="flex flex-col gap-stack-gap flex-1">
<div class="flex items-center justify-between">
<h2 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Action Log</h2>
<button class="text-primary hover:text-secondary transition-colors font-label-md text-label-md flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]" data-icon="pause">pause</span> Halt
                    </button>
</div>
<div class="flex flex-col relative before:absolute before:inset-y-2 before:left-[11px] before:w-px before:bg-white/10 ml-1">
<!-- Step 1: Completed -->
<div class="flex gap-4 relative pb-6 group action-item" style="animation-delay: 0.1s;">
<div class="w-6 h-6 rounded-full bg-primary-container/20 border border-primary text-primary flex items-center justify-center shrink-0 z-10 backdrop-blur-sm shadow-[0_0_10px_rgba(173,198,255,0.3)]">
<span class="material-symbols-outlined text-[14px]" data-icon="check">check</span>
</div>
<div class="flex flex-col gap-1 pt-0.5">
<p class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Navigating to google.com</p>
<span class="font-mono-code text-mono-code text-outline text-[11px]">0.4s</span>
</div>
</div>
<!-- Step 2: Completed -->
<div class="flex gap-4 relative pb-6 group action-item" style="animation-delay: 0.2s;">
<div class="w-6 h-6 rounded-full bg-primary-container/20 border border-primary text-primary flex items-center justify-center shrink-0 z-10 backdrop-blur-sm shadow-[0_0_10px_rgba(173,198,255,0.3)]">
<span class="material-symbols-outlined text-[14px]" data-icon="check">check</span>
</div>
<div class="flex flex-col gap-1 pt-0.5">
<p class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Typing query: <span class="text-tertiary">"best hiking boots 2024"</span></p>
<span class="font-mono-code text-mono-code text-outline text-[11px]">1.2s</span>
</div>
</div>
<!-- Step 3: Running -->
<div class="flex gap-4 relative group action-item" style="animation-delay: 0.3s;">
<div class="w-6 h-6 rounded-full bg-surface-container-highest border border-primary text-primary flex items-center justify-center shrink-0 z-10 backdrop-blur-sm relative shadow-[0_0_15px_rgba(75,142,255,0.2)]">
<div class="w-4 h-4 loading-ring absolute"></div>
<!-- Small pulsing dot in center -->
<div class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse"></div>
</div>
<div class="glass-card rounded-lg p-3 flex-1 flex flex-col gap-2 -mt-2">
<p class="font-body-sm text-body-sm text-on-surface font-medium">Clicking 'Search'</p>
<div class="flex gap-2">
<span class="px-2 py-0.5 rounded text-[10px] font-mono-code bg-primary-container/20 text-primary border border-primary/30">Action</span>
<span class="px-2 py-0.5 rounded text-[10px] font-mono-code bg-surface-container text-on-surface-variant border border-white/5">CSS Selector</span>
</div>
</div>
</div>
<!-- Step 4: Pending (Future) -->
<div class="flex gap-4 relative pt-6 opacity-40 action-item" style="animation-delay: 0.4s;">
<div class="w-6 h-6 rounded-full bg-surface border border-outline-variant text-outline-variant flex items-center justify-center shrink-0 z-10">
<div class="w-1.5 h-1.5 bg-outline-variant rounded-full"></div>
</div>
<div class="flex flex-col gap-1 pt-0.5">
<p class="font-body-sm text-body-sm text-on-surface-variant">Analyzing results</p>
</div>
</div>
</div>
</section>
</main>
<!-- Mobile Bottom Navigation -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-surface-container/80 dark:bg-surface-container/80 backdrop-blur-[32px] border-t border-white/15 shadow-[0_-4px_24px_rgba(0,0,0,0.5)] rounded-t-2xl shrink-0">
<a class="flex flex-col items-center justify-center text-on-surface-variant p-3 hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
</a>
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full p-3 shadow-[0_0_15px_rgba(75,142,255,0.4)] active:scale-110 duration-200 transition-all transform hover:text-primary" href="#">
<span class="material-symbols-outlined" data-icon="bolt">bolt</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant p-3 hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant p-3 hover:text-primary transition-all" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</a>
</nav>
</body></html>
